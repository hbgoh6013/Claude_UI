<!DOCTYPE html>
<html>
<head><title>WebSocket Test</title></head>
<body>
<h2>WebSocket Test (no React)</h2>
<div id="log" style="font-family:monospace; white-space:pre-wrap;"></div>
<script>
function log(msg) {
  document.getElementById('log').textContent += new Date().toTimeString().slice(0,8) + ' ' + msg + '\n';
  console.log(msg);
}

log('Creating WebSocket to ws://127.0.0.1:18080...');
const ws = new WebSocket('ws://127.0.0.1:18080');

ws.onopen = () => log('OPEN - connected!');
ws.onmessage = (e) => log('MESSAGE: ' + e.data.substring(0, 200));
ws.onerror = (e) => log('ERROR');
ws.onclose = (e) => log('CLOSE code=' + e.code + ' reason="' + e.reason + '" clean=' + e.wasClean);
</script>
</body>
</html>
