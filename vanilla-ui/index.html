<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung SDI - PLC Monitor</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <span class="header-logo">
                    <span class="logo-accent">Samsung</span> SDI
                </span>
                <div class="header-divider"></div>
                <span style="font-size: 11px; color: var(--text-muted); font-weight: 500;">PLC Monitor</span>
            </div>
            <div class="header-right">
                <label class="toggle-switch">
                    <input type="checkbox" id="demo-toggle">
                    <span class="toggle-slider"></span>
                    <span class="toggle-label">Demo</span>
                </label>
                <div id="connection-status" class="connection-status disconnected">
                    <span class="status-dot"></span>
                    <span id="status-text" class="status-text">Disconnected</span>
                </div>
            </div>
        </header>

        <!-- Tab Bar -->
        <nav class="tab-bar">
            <button class="tab-item active" data-tab="monitor">
                <svg class="tab-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M1 2.5A1.5 1.5 0 012.5 1h11A1.5 1.5 0 0115 2.5v9a1.5 1.5 0 01-1.5 1.5H10v1h1.5a.5.5 0 010 1h-7a.5.5 0 010-1H6v-1H2.5A1.5 1.5 0 011 11.5v-9zM2.5 2a.5.5 0 00-.5.5v9a.5.5 0 00.5.5h11a.5.5 0 00.5-.5v-9a.5.5 0 00-.5-.5h-11zM7 14v-1h2v1H7z"/>
                </svg>
                Monitor
            </button>
            <button class="tab-item" data-tab="settings">
                <svg class="tab-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 4.754a3.246 3.246 0 100 6.492 3.246 3.246 0 000-6.492zM5.754 8a2.246 2.246 0 114.492 0 2.246 2.246 0 01-4.492 0z"/>
                    <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 01-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 01-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 01.52 1.255l-.16.292c-.892 1.64.902 3.434 2.541 2.54l.292-.159a.873.873 0 011.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 011.255-.52l.292.16c1.64.892 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 01.52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 01-.52-1.255l.16-.292c.892-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 01-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 002.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 001.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 00-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 00-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 00-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 001.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 003.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 002.692-1.115l.094-.319z"/>
                </svg>
                Settings
            </button>
        </nav>

        <!-- Tab Content -->
        <div class="tab-content">
            <div id="monitor-content" class="tab-panel active"></div>
            <div id="settings-content" class="tab-panel"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/logger.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/sysmon.js"></script>
    <script src="js/monitor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
